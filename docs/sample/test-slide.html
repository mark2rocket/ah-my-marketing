<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1080px;
      background: #0066FF;
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px;
      position: relative;
    }
    .brand {
      position: absolute;
      top: 40px;
      left: 50px;
      font-size: 22px;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      letter-spacing: 2px;
    }
    .hook {
      font-size: 52px;
      font-weight: 900;
      color: #FFFFFF;
      text-align: center;
      line-height: 1.3;
      margin-bottom: 40px;
    }
    .hook em {
      color: #FFE600;
      font-style: normal;
    }
    .sub {
      font-size: 30px;
      font-weight: 400;
      color: rgba(255,255,255,0.85);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 60px;
    }
    .cta {
      background: #FFFFFF;
      color: #0066FF;
      padding: 24px 60px;
      border-radius: 50px;
      font-size: 28px;
      font-weight: 700;
      border: none;
    }
    .badge {
      position: absolute;
      bottom: 40px;
      right: 50px;
      font-size: 18px;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div class="brand">BrandA</div>
  <h1 class="hook">광고비는 줄이고<br><em>전환율은 2배</em>로</h1>
  <p class="sub">고객의 언어로 말하면<br>광고가 달라집니다</p>
  <button class="cta">지금 무료로 시작하기</button>
  <div class="badge">VP1_IMG1x1_v1</div>
</body>
</html>
